# ── Ongoing research ──────────────────────────────────────────────────
# status: one of  active | exploratory
ongoing:
  - name: SEPIA
    expansion: Spatial Egocentric Perception for Interactive Agents
    status: active
    blurb: >-
      A perception stack that lets interactive agents build and query spatial
      memory from first-person video — grounding what an agent sees into where
      it can act.
    tags: [Egocentric Vision, Spatial Memory, Embodied AI]
    url:

  - name: Show2Instruct
    expansion: Learning manipulation from demonstration
    status: active
    blurb: >-
      Turning human demonstrations into executable robot instructions, bridging
      egocentric observation and language-conditioned control.
    tags: [Imitation, Multimodal LLMs, Manipulation]
    url: https://show2instruct.com

  - name: Dynamo
    expansion: CORE Labs
    status: active
    blurb: >-
      Dynamic scene understanding for autonomy, developed within CORE Labs —
      reasoning about motion and change in unstructured environments.
    tags: [Scene Understanding, Temporal Graphs]
    url: https://www.core-network.ai/#/dynamo

  - name: PRiSM
    expansion: Perception, reasoning & spatial modelling
    status: exploratory
    blurb: >-
      Early-stage work connecting multimodal reasoning to explicit spatial
      models for robot decision-making.
    tags: [Spatial Perception, Reasoning]
    url:

